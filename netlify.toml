[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

# Google Gemini API Proxy (CORS Bypass for Production)
[[redirects]]
  from = "/api/gemini/*"
  to = "https://generativelanguage.googleapis.com/v1beta/models/:splat"
  status = 200
  force = true
